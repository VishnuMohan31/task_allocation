services:
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: productivity-backend
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    volumes:
      # Persist task data outside the container
      - ./api/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/tasks/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Frontend is intentionally excluded here.
# Run it locally with: cd ui && npm run dev
# When ready to dockerize the frontend, add the frontend service back.
